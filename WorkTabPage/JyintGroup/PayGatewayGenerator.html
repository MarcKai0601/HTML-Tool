<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>金流串接生成器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3"></script>
    <style>
        body { background-color: #f8f9fa; color: #212529; }
        [data-bs-theme="dark"] body { background-color: #212529 !important; color: #f8f9fa !important; }
        textarea, select, input { font-size: 0.9rem !important; }
        .form-control, .form-select { background-color: #f5f5f5; color: #000; }
        [data-bs-theme="dark"] .form-control, [data-bs-theme="dark"] .form-select { background-color: #343a40; color: #f8f9fa; }
        .form-label { font-weight: bold; }
        .btn { font-size: 0.85rem; }
        .row .col { padding: 6px 12px; }
        .accordion-button:not(.collapsed) { background-color: #e7f1ff; color: #0c63e4; }
        [data-bs-theme="dark"] .accordion-button:not(.collapsed) { background-color: #1a3a5f; color: #6ea8fe; }
        [data-bs-theme="dark"] .accordion-item { background-color: #2b3035; border-color: #495057; }
        [data-bs-theme="dark"] .accordion-button { background-color: #212529; color: #f8f9fa; }
        [data-bs-theme="dark"] .accordion-button::after { filter: invert(1); }
    </style>
</head>
<body>
<div id="app" class="container py-4"></div>

<template id="original-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>金流串接程式碼生成器</h2>
        <button type="button" class="btn btn-primary btn-lg" @click="generateAll">產生程式碼 🚀</button>
    </div>

    <div class="accordion mb-4" id="configAccordion">
        <!-- 1. 基本資訊 -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse1">1. 基本資訊</button></h2>
            <div id="collapse1" class="accordion-collapse collapse show"><div class="accordion-body">
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">金流名稱 (英文)</label>
                        <input class="form-control" v-model="gatewayName" placeholder="e.g. SmartPay" @input="updateDerived">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Catch ID</label>
                        <input class="form-control" v-model="catchId">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Success Code (Pay)</label>
                        <input class="form-control" v-model="successCode">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4">
                        <label class="form-label">API 金額單位</label>
                        <div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="amountUnit" value="DOLLAR">
                                <label class="form-check-label">元 (Dollar)</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="amountUnit" value="CENT">
                                <label class="form-check-label">分 (Cent)</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div></div>
        </div>

        <!-- 2. URLs -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse2">2. URLs 設定</button></h2>
            <div id="collapse2" class="accordion-collapse collapse"><div class="accordion-body">
                <div class="row mb-2" v-for="(label, key) in urlFields" :key="key">
                    <div class="col-md-3"><label class="form-label">{{label}}</label></div>
                    <div class="col-md-9"><input class="form-control" v-model="urls[key]"></div>
                </div>
            </div></div>
        </div>

        <!-- 3. 簽名 & Header -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse3">3. 簽名 & Header</button></h2>
            <div id="collapse3" class="accordion-collapse collapse"><div class="accordion-body">
                <h5>簽名方式</h5>
                <h5>簽名邏輯組合</h5>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label text-primary">1. 簽名前過濾</label>
                        <select class="form-select" v-model="signFilter">
                            <option value="REMOVE_EMPTY">移除空值</option>
                            <option value="REMOVE_SIGN_EMPTY">移除 sign 與空值</option>
                            <option value="NONE">不過濾</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-primary">2. 簽名字串拼接</label>
                        <select class="form-select" v-model="signSort">
                            <option value="SORT_K_V_AND">字典排序 (k=v&)</option>
                            <option value="NO_SORT_K_V_AND">不排序 (k=v&)</option>
                            <option value="SORT_KV">字典排序無符號 (kv)</option>
                            <option value="NO_SORT_KV">不排序無符號 (kv)</option>
                            <option value="JSON">JSON 字串</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-primary">3. 加簽演算法</label>
                        <select class="form-select" v-model="signAlgo">
                            <option value="MD5">MD5</option>
                            <option value="SHA256">SHA-256</option>
                            <option value="HMAC_SHA256">HMAC-SHA256</option>
                            <option value="RSA">RSA</option>
                            <option value="CUSTOM">完全自訂程式碼</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3" v-if="signAlgo === 'CUSTOM'">
                    <textarea class="form-control" v-model="customSignCode" rows="6" placeholder="貼入 makeSign() 方法體..."></textarea>
                </div>
                <div class="mb-3" v-else>
                    <label class="form-label">Sign Key 來源</label>
                    <select class="form-select w-50" v-model="signKeySource">
                        <option value="private">Private Key</option>
                        <option value="merchant">Merchant Sign</option>
                    </select>
                </div>
                
                <h5 class="mt-4">Header 設定 <button class="btn btn-sm btn-outline-secondary" @click="headers.push({name: '', type: 'STATIC', extra: ''})">新增</button></h5>
                <div class="row mb-2" v-for="(h, i) in headers" :key="i">
                    <div class="col-3"><input class="form-control" v-model="h.name" placeholder="Header Name"></div>
                    <div class="col-3">
                        <select class="form-select" v-model="h.type">
                            <option value="SIGN">簽名值</option>
                            <option value="MCH_ID">第三方商戶號</option>
                            <option value="TS_MS">時間戳(ms)</option>
                            <option value="TS_S">時間戳(s)</option>
                            <option value="PRIVATE_KEY">私鑰 (PrivateKey)</option>
                            <option value="PUBLIC_KEY">公鑰 (PublicKey)</option>
                            <option value="STATIC">固定字串</option>
                            <option value="CUSTOM_PAY">自訂 Pay</option>
                            <option value="CUSTOM_WD">自訂 Withdraw</option>
                        </select>
                    </div>
                    <div class="col-5">
                        <input class="form-control" v-if="['STATIC', 'CUSTOM_PAY', 'CUSTOM_WD'].includes(h.type)" v-model="h.extra" placeholder="自訂值/表達式">
                    </div>
                    <div class="col-1"><button class="btn btn-danger btn-sm" @click="headers.splice(i, 1)">刪</button></div>
                </div>
            </div></div>
        </div>

        <!-- 4. 收款 (Pay) 參數 -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse4">4. 收款 (Pay) 參數</button></h2>
            <div id="collapse4" class="accordion-collapse collapse"><div class="accordion-body">
                <h5>請求方式設定</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Content Type</label>
                        <select class="form-select" v-model="payReq.contentType">
                            <option value="ContentType.JSON">JSON</option>
                            <option value="ContentType.FORM_DATA">FORM DATA</option>
                            <option value="ContentType.QUERY_PARAMS">QUERY PARAMS</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">HTTP Method</label>
                        <select class="form-select" v-model="payReq.httpMethod">
                            <option value="HttpMethod.POST">POST</option>
                            <option value="HttpMethod.GET">GET</option>
                            <option value="HttpMethod.PUT">PUT</option>
                            <option value="HttpMethod.PATCH">PATCH</option>
                            <option value="HttpMethod.DELETE">DELETE</option>
                            <option value="HttpMethod.OPTIONS">OPTIONS</option>
                            <option value="HttpMethod.HEAD">HEAD</option>
                            <option value="HttpMethod.TRACE">TRACE</option>
                        </select>
                    </div>
                </div>
                <hr>
                <param-table title="下單參數 (createOrderParams)"  :rows="payParams" @add="payParams.push({name:'', type:'MCH_ID', extra:''})" @remove="(i)=>payParams.splice(i, 1)"></param-table>
                <hr>
                <param-table title="查單參數 (refreshOrderParams)" :rows="payQueryParams" @add="payQueryParams.push({name:'', type:'MCH_ID', extra:''})" @remove="(i)=>payQueryParams.splice(i, 1)"></param-table>
            </div></div>
        </div>

        <!-- 5. 收款回應設定 -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse5">5. 收款回應設定</button></h2>
            <div id="collapse5" class="accordion-collapse collapse"><div class="accordion-body">
                <div class="row mb-3">
                    <div class="col-md-3"><label class="form-label">Pay URL 路徑</label><input class="form-control" v-model="payRes.payUrl"></div>
                    <div class="col-md-3"><label class="form-label">channelOrderKey</label><input class="form-control" v-model="payRes.channelOrder"></div>
                    <div class="col-md-3"><label class="form-label">orderStatusKey</label><input class="form-control" v-model="payRes.orderStatus"></div>
                    <div class="col-md-3"><label class="form-label">confirmedAmount</label><input class="form-control" v-model="payRes.amount"></div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Order Doing <button class="btn btn-sm btn-outline-secondary py-0" @click="payRes.doing.push({code:'', msg:''})">+</button></label>
                        <div class="d-flex mb-1" v-for="(d, i) in payRes.doing" :key="i"><input class="form-control form-control-sm me-1" v-model="d.code"><input class="form-control form-control-sm me-1" v-model="d.msg"><button class="btn btn-sm btn-danger py-0" @click="payRes.doing.splice(i, 1)">-</button></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Order Fail <button class="btn btn-sm btn-outline-secondary py-0" @click="payRes.fail.push({code:'', msg:''})">+</button></label>
                        <div class="d-flex mb-1" v-for="(f, i) in payRes.fail" :key="i"><input class="form-control form-control-sm me-1" v-model="f.code"><input class="form-control form-control-sm me-1" v-model="f.msg"><button class="btn btn-sm btn-danger py-0" @click="payRes.fail.splice(i, 1)">-</button></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Callback Keys (一行一個)</label>
                        <textarea class="form-control form-control-sm" rows="3" v-model="payRes.callbackKeys"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4"><label class="form-label">Callback 訂單號 field</label><input class="form-control" v-model="payRes.cbOrder"></div>
                    <div class="col-md-4"><label class="form-label">Callback 成功字串</label><input class="form-control" v-model="payRes.cbSuccess"></div>
                    <div class="col-md-4"><label class="form-label">Callback 失敗字串</label><input class="form-control" v-model="payRes.cbFail"></div>
                </div>
            </div></div>
        </div>

        <!-- 6. 代付 (Withdraw) 參數 -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse6">6. 代付 (Withdraw) 參數</button></h2>
            <div id="collapse6" class="accordion-collapse collapse"><div class="accordion-body">
                <h5>請求方式設定</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Content Type</label>
                        <select class="form-select" v-model="wdReq.contentType">
                            <option value="ContentType.JSON">JSON (JsonDataUtil)</option>
                            <option value="ContentType.FORM_DATA">FORM DATA (FormDataUtil)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">HTTP Method</label>
                        <select class="form-select" v-model="wdReq.httpMethod">
                            <option value="HttpMethod.POST">POST</option>
                            <option value="HttpMethod.GET">GET</option>
                        </select>
                    </div>
                </div>
                <hr>
                <param-table title="下單參數 (execute)"  :rows="wdParams" @add="wdParams.push({name:'', type:'MCH_ID', extra:''})" @remove="(i)=>wdParams.splice(i, 1)"></param-table>
                <hr>
                <param-table title="餘額參數 (getBalance)" :rows="wdBalanceParams" @add="wdBalanceParams.push({name:'', type:'MCH_ID', extra:''})" @remove="(i)=>wdBalanceParams.splice(i, 1)"></param-table>
                <hr>
                <param-table title="查單參數 (getOrder)" :rows="wdQueryParams" @add="wdQueryParams.push({name:'', type:'MCH_ID', extra:''})" @remove="(i)=>wdQueryParams.splice(i, 1)"></param-table>
            </div></div>
        </div>

        <!-- 7. 代付回應設定 -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse7">7. 代付回應設定</button></h2>
            <div id="collapse7" class="accordion-collapse collapse"><div class="accordion-body">
                <h5>ResponseCode Enums <button class="btn btn-sm btn-outline-secondary" @click="wdRes.enums.push({name:'', code:'', desc:'', status:'STATUS_WITHDRAWING', isSuccess:false})">新增</button></h5>
                <div class="row fw-bold mb-1">
                    <div class="col-2">Enum名</div><div class="col-2">Third Code</div><div class="col-3">描述</div><div class="col-3">內部狀態</div><div class="col-1">Success?</div><div class="col-1"></div>
                </div>
                <div class="row mb-2" v-for="(e, i) in wdRes.enums" :key="i">
                    <div class="col-2"><input class="form-control form-control-sm" v-model="e.name"></div>
                    <div class="col-2"><input class="form-control form-control-sm" v-model="e.code"></div>
                    <div class="col-3"><input class="form-control form-control-sm" v-model="e.desc"></div>
                    <div class="col-3">
                        <select class="form-select form-select-sm" v-model="e.status">
                            <option value="WithdrawOrder.STATUS_WITHDRAWING">WITHDRAWING</option>
                            <option value="WithdrawOrder.STATUS_WITHDRAWN">WITHDRAWN</option>
                            <option value="WithdrawOrder.STATUS_FAILED_ON_WITHDRAWING">FAILED_ON_WITHDRAWING</option>
                        </select>
                    </div>
                    <div class="col-1 text-center"><input type="radio" name="successEnum" :value="true" v-model="e.isSuccess" @change="setSuccessEnum(i)"></div>
                    <div class="col-1"><button class="btn btn-danger btn-sm py-0" @click="wdRes.enums.splice(i, 1)">-</button></div>
                </div>
                <hr>
                <div class="row">
                    <div class="col-md-4"><label class="form-label">Callback 訂單號 field</label><input class="form-control" v-model="wdRes.cbOrder"></div>
                    <div class="col-md-4"><label class="form-label">Callback 成功字串</label><input class="form-control" v-model="wdRes.cbSuccess"></div>
                    <div class="col-md-4"><label class="form-label">Callback 失敗字串</label><input class="form-control" v-model="wdRes.cbFail"></div>
                </div>
            </div></div>
        </div>

        <!-- 8. 測試設定 -->
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse8">8. 測試設定</button></h2>
            <div id="collapse8" class="accordion-collapse collapse"><div class="accordion-body">
                <div class="row">
                    <div class="col-md-12">
                        <h5>Channel Code Mapping <button class="btn btn-sm btn-outline-secondary" @click="testConfig.channels.push({internal:'', third:''})">+</button></h5>
                        <div class="d-flex mb-1" v-for="(c, i) in testConfig.channels" :key="i">
                            <input class="form-control form-control-sm me-1" placeholder="我方" v-model="c.internal">
                            <input class="form-control form-control-sm me-1" placeholder="第三方" v-model="c.third">
                            <button class="btn btn-danger btn-sm" @click="testConfig.channels.splice(i, 1)">-</button>
                        </div>
                    </div>

                </div>
                <div class="mt-3">
                    <h5>支援幣種 (以逗號分隔)</h5>
                    <input class="form-control" v-model="testConfig.currencies" placeholder="VND, THB, IDR...">
                </div>
            </div></div>
        </div>
    </div>

    <!-- 輸出區域 -->
    <ul class="nav nav-tabs" id="outputTabs" role="tablist">
        <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#out1" type="button" role="tab">{{className}}Method.java</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#out2" type="button" role="tab">{{className}}WithdrawMethod.java</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#out3" type="button" role="tab">{{className}}MethodTest.java</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#out4" type="button" role="tab">{{className}}WithdrawMethodTest.java</button></li>
    </ul>
    <div class="tab-content mt-2">
        <div class="tab-pane fade show active" id="out1" role="tabpanel">
            <button class="btn btn-secondary btn-sm mb-2" @click="copy(outPay)">複製</button>
            <textarea class="form-control text-monospace" rows="20" readonly v-model="outPay"></textarea>
        </div>
        <div class="tab-pane fade" id="out2" role="tabpanel">
            <button class="btn btn-secondary btn-sm mb-2" @click="copy(outWd)">複製</button>
            <textarea class="form-control text-monospace" rows="20" readonly v-model="outWd"></textarea>
        </div>
        <div class="tab-pane fade" id="out3" role="tabpanel">
            <button class="btn btn-secondary btn-sm mb-2" @click="copy(outPayTest)">複製</button>
            <textarea class="form-control text-monospace" rows="20" readonly v-model="outPayTest"></textarea>
        </div>
        <div class="tab-pane fade" id="out4" role="tabpanel">
            <button class="btn btn-secondary btn-sm mb-2" @click="copy(outWdTest)">複製</button>
            <textarea class="form-control text-monospace" rows="20" readonly v-model="outWdTest"></textarea>
        </div>
    </div>
</template>

<script>
const paramTypeOptions = [
    {v:'MCH_ID', l:'第三方商戶號'},
    {v:'MY_MCH_ID', l:'我方商戶號'},
    {v:'ORDER_ID', l:'訂單號'},
    {v:'AMOUNT_BD', l:'金額 (BigDecimal)'},
    {v:'AMOUNT_STR', l:'金額 (String)'},
    {v:'CARD', l:'付款卡號'},
    {v:'NAME', l:'真實姓名'},
    {v:'EMAIL', l:'Email'},
    {v:'PHONE', l:'手機號'},
    {v:'BANK_CODE', l:'銀行代碼'},
    {v:'NOTIFY_URL', l:'回調地址'},
    {v:'STATIC', l:'固定字串'},
    {v:'CUSTOM', l:'自訂表達式'}
];

const ParamTable = {
    props: ['title', 'rows'],
    template: `
        <div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5>{{title}}</h5>
                <div>
                    <button class="btn btn-sm btn-outline-primary me-2" @click="showImport = !showImport">批量貼上 API 表格</button>
                    <button class="btn btn-sm btn-outline-secondary" @click="$emit('add')">新增一行</button>
                </div>
            </div>
            <div v-if="showImport" class="mb-3 p-3 bg-light border rounded">
                <label class="form-label text-muted small">直接貼上 API 文件表格 (參數名需在第一欄)：</label>
                <textarea class="form-control mb-2" rows="4" v-model="importText" placeholder="mchNum\tString\tY\t商户编号..."></textarea>
                <button class="btn btn-sm btn-primary" @click="parseImport">解析並附加</button>
                <button class="btn btn-sm btn-secondary ms-2" @click="showImport = false">取消</button>
            </div>
            <div class="row mb-1 fw-bold">
                <div class="col-3">參數名</div><div class="col-4">值類型</div><div class="col-4">自訂值</div><div class="col-1"></div>
            </div>
            <div class="row mb-2" v-for="(r, i) in rows" :key="i">
                <div class="col-3"><input class="form-control form-control-sm" v-model="r.name"></div>
                <div class="col-4">
                    <select class="form-select form-select-sm" v-model="r.type">
                        <option v-for="o in opts" :value="o.v">{{o.l}}</option>
                    </select>
                </div>
                <div class="col-4">
                    <input class="form-control form-control-sm" v-if="['STATIC', 'CUSTOM', 'BANK_CODE'].includes(r.type)" v-model="r.extra" placeholder="依類型輸入">
                </div>
                <div class="col-1"><button class="btn btn-danger btn-sm py-0" @click="$emit('remove', i)">-</button></div>
            </div>
        </div>
    `,
    data() { return { opts: paramTypeOptions, showImport: false, importText: '' }; },
    methods: {
        genWithdrawRequest(urlVar, mapsVar, context) {
            let hasHeader = !!this.genHeaders(context);
            let className = this.wdReq.contentType === 'ContentType.JSON' ? 'JsonDataUtil' : 'FormDataUtil';
            let method = this.wdReq.httpMethod === 'HttpMethod.POST' ? 'post' : 'get';
            
            if (className === 'JsonDataUtil') {
                if (method === 'post') {
                    if (hasHeader) return `Map<String, Object> responseMap = JsonDataUtil.post(${urlVar}, ${mapsVar}, Map.class, Header, 200);`;
