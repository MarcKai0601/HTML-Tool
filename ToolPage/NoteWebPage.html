<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <title>筆記</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    iframe {
      width: 100%;
      height: 800px;
      border: none;
    }
    .tab-content {
      padding: 1rem;
      border: 1px solid #dee2e6;
      border-top: none;
      border-radius: 0 0 0.375rem 0.375rem;
    }
    [data-bs-theme="light"] .tab-content { background-color: #ffffff; color: #212529; }
    [data-bs-theme="dark"]  .tab-content { background-color: #1e1e1e; color: #f8f9fa; }
  </style>
</head>
<body>
<div class="container py-4">

  <ul class="nav nav-tabs" id="noteTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active"
              id="note1-tab"
              data-bs-toggle="tab"
              data-bs-target="#note1"
              type="button" role="tab"
              aria-controls="note1"
              aria-selected="true">職涯計畫</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link"
              id="note2-tab"
              data-bs-toggle="tab"
              data-bs-target="#note2"
              type="button" role="tab"
              aria-controls="note2"
              aria-selected="false">SSO 學習筆記</button>
    </li>
  </ul>

  <div class="tab-content mt-3" id="noteTabsContent">
    <div class="tab-pane fade show active" id="note1" role="tabpanel" aria-labelledby="note1-tab">
      <iframe src="../NotePage/career_html.html" id="iframe-career"></iframe>
    </div>
    <div class="tab-pane fade" id="note2" role="tabpanel" aria-labelledby="note2-tab">
      <iframe src="../NotePage/sso_notes.html" id="iframe-sso"></iframe>
    </div>
  </div>

</div>

<script>
  const htmlEl = document.documentElement;

  function sendThemeToIframes(theme) {
    document.querySelectorAll('iframe').forEach(iframe => {
      iframe.contentWindow?.postMessage({ theme }, '*');
    });
  }

  function handleMessageFromIframe(event) {
    if (event.data?.ask === 'theme') {
      event.source?.postMessage({ theme: htmlEl.getAttribute('data-bs-theme') || 'light' }, '*');
    }
  }

  window.addEventListener('message', (e) => {
    if (e.data?.theme) {
      htmlEl.setAttribute('data-bs-theme', e.data.theme);
      sendThemeToIframes(e.data.theme);
    }
    if (e.data?.ask === 'theme') handleMessageFromIframe(e);
  });

  window.parent?.postMessage({ ask: 'theme' }, '*');
</script>
</body>
</html>
