<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>銀行對應工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3"></script>
    <style>
        body { background-color: #f8f9fa; color: #212529; }
        [data-bs-theme="dark"] body { background-color: #212529 !important; color: #f8f9fa !important; }
        textarea, select, input { font-size: 0.9rem !important; }
        .form-control, .form-select { background-color: #f5f5f5; color: #000; }
        [data-bs-theme="dark"] .form-control, [data-bs-theme="dark"] .form-select { background-color: #343a40; color: #f8f9fa; }
        .form-label { font-weight: bold; }
        .btn { font-size: 0.85rem; }
        .row .col { padding: 6px 12px; }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<template id="original-content">
    <div class="mb-3">
        <label  class="form-label">1. 選擇币种</label>
        <select v-model="currencySelect" @change="changeCurrency" class="form-select">
            <option v-for="currencyT in currencyArr" :value="currencyT">{{currencyT}}</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">1-1. 取代字串</label>
        <textarea class="form-control" v-model="finalReplaceStrList" rows="3"></textarea>
    </div>
    <div class="mb-3 form-check form-switch">
        <label class="form-check-label"><input role="switch" class="form-check-input" type="checkbox" v-model="removeBracketsIn">&nbsp;移除括號內的內容</label> <br>
        <label class="form-check-label"><input role="switch" class="form-check-input" type="checkbox" v-model="removeBracketsOut">&nbsp;移除括號外的內容</label>
    </div>
    <hr>
    <div class="mb-3">
        <label class="form-label">2. 金流商銀行代碼
            <select v-model="thirdPartyBankCodeTypeSelect" @change="onChangeThirdPartyBankDataType">
                <option v-for="item in thirdPartyBankCodeType">{{item.type}}</option>
            </select>
        </label>
        <textarea class="form-control" v-model="thirdPartyBankCodeData" rows="3" :placeholder="thirdPartyBankCodeSample"></textarea>
        <button type="button" class="btn btn-primary mt-2" @click="generateQuerySql">👆产生DB查询SQL</button>
    </div>
    <hr>
    <div class="mb-3">
        <label class="form-label">3. 前往DB執行查詢SQL</label>
        <textarea class="form-control" v-model="generateQuerySqlResult" rows="3" disabled></textarea>
    </div>
    <hr>
    <div class="mb-3">
        <label class="form-label">4. 貼上執行結果 (JSON) </label>
        <textarea class="form-control" v-model="dbDataJsonStr" rows="3"></textarea>
        <button type="button" class="btn btn-primary mt-2" @click="execJson">👆产生BANKCODE下拉選單mapping表格</button>
    </div>

    <div class="container text-center">
        <div class="row border-bottom bg-secondary text-white py-2" v-if="dataList">
            <div class="col col-1">選用</div>
            <div class="col col-3">輸入名稱</div>
            <div class="col col-4">資料庫匹配結果</div>
            <div class="col col-4">手動調整/最終名稱</div>
        </div>
        <div class="row align-items-center border-bottom" v-for="item in dataList" :key="item.id">
            <div class="col col-1"><input type="checkbox" v-model="item.support"></div>
            <div class="col col-3 text-start">{{ item.inputName }}</div>
            <div class="col col-4">
                <select class="form-select" v-model="item.bankName">
                    <option v-for="bn in item.bankNames" :value="bn">{{ bn }}</option>
                </select>
            </div>
            <div class="col col-4"><input class="form-control" v-model="item.bankName"></div>
        </div>
    </div>
    <hr>
    <div class="mb-3">
        <label class="form-label">5. 最終結果 (Java 格式)
            <button type="button" class="btn btn-primary" @click="generateFinalResult">👆产生</button>
        </label>
        <textarea class="form-control" v-model="finalResult" rows="3" disabled></textarea>
    </div>
</template>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                currencyArr: ["vnd","inr","brl","thb","pkr","myr","idr","php","usd","ngn","mxn","zar","try","kes","cop","bdt","egp","pen","eur","rmb","jpy","krw","twd","clp","rub","sgd"],
                removeBracketsIn: false,
                removeBracketsOut: false,
                currencySelect: 'vnd',
                finalReplaceStrList: "",
                thirdPartyBankCodeTypeSelect: 'json1',
                thirdPartyBankCodeData: null,
                generateQuerySqlResult: null,
                dbDataJsonStr: null,
                dataList: null,
                finalResult: null,
                defaultReplaceTarget: ['bank', '\\', '/', ' - '],
                currencyReplaceTarget: {
                    "thb": ['plc.', 'ltd', 'limited', 'na'],
                    "idr": ['pt.', 'tbk', '(persero)', 'na'],
                    "vnd": ['nh', 'ngan hang', 'tmcp']
                },
                thirdPartyBankCodeType: [
                    { type: 'json1', sample: '{"建设银行":"001"}' },
                    { type: 'json2', sample: '{"001":"建设银行"}' },
                    { type: 'csv1', sample: '建设银行,001' },
                    { type: 'csv2', sample: '001,建设银行' }
                ],
                thirdPartyBankCodeSample: '{"建设银行":"001"}',
            }
        },
        methods: {
            onChangeThirdPartyBankDataType() {
                const target = this.thirdPartyBankCodeType.find(t => t.type === this.thirdPartyBankCodeTypeSelect);
                this.thirdPartyBankCodeSample = target ? target.sample : '';
            },
            generateQuerySql() {
                if (!this.currencySelect) return alert('请先选择币种');
                if (!this.thirdPartyBankCodeData) return alert('请先输入金流商银行资讯');

                let sqlArr = [];
                let bankObj = {};
                try {
                    if (this.thirdPartyBankCodeTypeSelect.includes('json')) {
                        let temp = JSON.parse(this.thirdPartyBankCodeData);
                        if (this.thirdPartyBankCodeTypeSelect === 'json1') bankObj = temp;
                        else Object.keys(temp).forEach(k => bankObj[temp[k]] = k);
                    } else {
                        let lines = this.thirdPartyBankCodeData.split('\n');
                        lines.forEach(l => {
                            let parts = l.split(',');
                            if (parts.length >= 2) {
                                if (this.thirdPartyBankCodeTypeSelect === 'csv1') bankObj[parts[0].trim()] = parts[1].trim();
                                else bankObj[parts[1].trim()] = parts[2].trim();
                            }
                        });
                    }
                } catch (e) { return alert('解析格式失敗'); }

                Object.keys(bankObj).forEach(key => {
                    let bankCode = bankObj[key];
                    let likeKey = this.preprocessingKey(key);
                    let conditions = [`BankName LIKE '%${likeKey}%'`, `BankName LIKE '%${bankCode}%'`];
                    let bracketMatch = key.match(/\((.*?)\)/);
                    if (bracketMatch && bracketMatch[1]) conditions.push(`BankName LIKE '%${bracketMatch[1].trim()}%'`);

                    let whereClause = `(${conditions.join(' OR ')}) AND Currency = '${this.currencySelect}'`;
                    sqlArr.push(`SELECT group_concat(BankName SEPARATOR '@SEP@') as bankNames, '${bankCode}' AS code, '${key}' AS inputName FROM t_withdraw_channel_bank_code WHERE ${whereClause} UNION SELECT NULL AS bankNames, '${bankCode}' AS code, '${key}' AS inputName FROM DUAL WHERE NOT EXISTS (SELECT 1 FROM t_withdraw_channel_bank_code WHERE ${whereClause}) group by Code, InputName`);
                });

                this.generateQuerySqlResult = `SELECT JSON_ARRAYAGG(JSON_OBJECT('bankNames', bankNames, 'code', code, 'inputName', inputName)) AS jsonArray FROM ( ${sqlArr.join("\nUNION\n")} ) AS subquery;`;
            },
            changeCurrency() {
                let targets = this.currencyReplaceTarget[this.currencySelect] || [];
                this.finalReplaceStrList = [...this.defaultReplaceTarget, ...targets].join('\n');
            },
            execJson() {
                try {
                    let raw = JSON.parse(this.dbDataJsonStr);
                    // 處理 DB 可能回傳單一物件或陣列的情況
                    let dataArr = Array.isArray(raw) ? raw : (raw.jsonArray ? JSON.parse(raw.jsonArray) : []);
                    this.dataList = dataArr.map((d, index) => ({
                        ...d,
                        id: index,
                        support: true,
                        bankNames: d.bankNames ? d.bankNames.split('@SEP@') : [],
                        bankName: d.bankNames ? d.bankNames.split('@SEP@')[0] : ''
                    }));
                } catch (e) { alert('JSON 解析錯誤'); }
            },
            generateFinalResult() {
                let checkNameSet = new Set();
                let results = [];
                this.dataList.forEach(data => {
                    if (!data.support || !data.bankName) return;
                    if (checkNameSet.has(data.bankName)) return alert('重複的銀行名稱: ' + data.bankName);
                    checkNameSet.add(data.bankName);
                    results.push(`bankCode.put("${data.bankName}", "${data.code}"); // ${data.inputName}`);
                });
                this.finalResult = results.join("\n");
            },
            preprocessingKey(keyName) {
                if (!keyName) return '';
                let res = keyName;
                if (this.removeBracketsIn) res = res.replace(/\(.*?\)/g, '');
                if (this.removeBracketsOut) res = res.replace(/.*?\((.*?)\).*/g, '$1');
                this.finalReplaceStrList.split('\n').filter(v => v.trim()).forEach(v => {
                    res = res.replaceAll(v.trim(), '');
                });
                return res.trim();
            }
        },
        mounted() { this.changeCurrency(); },
        template: '#original-content'
    }).mount('#app');

    window.addEventListener('message', (e) => {
        if (e.data?.theme) document.documentElement.setAttribute('data-bs-theme', e.data.theme);
    });
    window.parent?.postMessage({ ask: 'theme' }, '*');
</script>
</body>
</html>
