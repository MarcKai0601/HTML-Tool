<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <title>Work Web Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    iframe {
      width: 100%;
      height: 800px;
      border: none;
    }
    .tab-content {
      padding: 1rem;
      border: 1px solid #dee2e6;
      border-top: none;
      border-radius: 0 0 0.375rem 0.375rem;
    }
    [data-bs-theme="light"] .tab-content { background-color: #ffffff; color: #212529; }
    [data-bs-theme="dark"]  .tab-content { background-color: #1e1e1e; color: #f8f9fa; }
  </style>
</head>
<body>
<div class="container py-4">

  <ul class="nav nav-tabs" id="toolTabs" role="tablist">

    <!-- 公司 dropdown 選擇器（固定） -->
    <li class="nav-item dropdown">
      <button class="nav-link dropdown-toggle text-muted" type="button"
              data-bs-toggle="dropdown" id="companyToggle"
              style="font-size:0.75rem">JyintGroup</button>
      <ul class="dropdown-menu" id="companyMenu">
        <li><button class="dropdown-item active" data-company="JyintGroup">JyintGroup</button></li>
        <!-- 未來新增：<li><button class="dropdown-item" data-company="CompanyB">CompanyB</button></li> -->
      </ul>
    </li>

    <!-- 視覺分隔線（固定） -->
    <li class="nav-item d-flex align-items-center px-1">
      <div style="height:1.25rem;border-left:1px solid var(--bs-border-color)"></div>
    </li>

    <!-- 工具 tabs（動態，由 JS 產生） -->
  </ul>

  <div class="tab-content mt-3" id="toolTabsContent">
    <!-- tab panes（動態，由 JS 產生） -->
  </div>

</div>

<script>
  const htmlEl = document.documentElement;

  const companies = {
    JyintGroup: [
      { label: '導覽',           src: '../WorkTabPage/JyintGroup/JyintGroup.html' },
      { label: '金流生成器',      src: '../WorkTabPage/JyintGroup/PayGatewayGenerator.html' },
      { label: '銀行 / 格式工具', src: '../WorkTabPage/JyintGroup/Bank-Tool.html' },
    ]
  };

  function sendThemeToIframes(theme) {
    document.querySelectorAll('iframe').forEach(iframe => {
      iframe.contentWindow?.postMessage({ theme }, '*');
    });
  }

  function selectCompany(name) {
    document.getElementById('companyToggle').textContent = name;

    document.querySelectorAll('#companyMenu .dropdown-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.company === name);
    });

    document.querySelectorAll('[data-tool-tab]').forEach(el => el.remove());
    document.getElementById('toolTabsContent').innerHTML = '';

    const tools = companies[name] || [];
    tools.forEach((tool, i) => {
      const paneId = `tool-pane-${i}`;
      const isFirst = i === 0;

      const li = document.createElement('li');
      li.setAttribute('data-tool-tab', '');
      li.className = 'nav-item';
      li.role = 'presentation';
      li.innerHTML = `<button class="nav-link${isFirst ? ' active' : ''}"
        data-bs-toggle="tab" data-bs-target="#${paneId}"
        type="button" role="tab"
        aria-selected="${isFirst}">${tool.label}</button>`;
      document.getElementById('toolTabs').appendChild(li);

      const pane = document.createElement('div');
      pane.className = `tab-pane fade${isFirst ? ' show active' : ''}`;
      pane.id = paneId;
      pane.role = 'tabpanel';
      pane.innerHTML = `<iframe src="${tool.src}"></iframe>`;
      document.getElementById('toolTabsContent').appendChild(pane);
    });

    sendThemeToIframes(htmlEl.getAttribute('data-bs-theme') || 'light');
  }

  document.getElementById('companyMenu').addEventListener('click', e => {
    const btn = e.target.closest('[data-company]');
    if (btn) selectCompany(btn.dataset.company);
  });

  window.addEventListener('message', (event) => {
    if (event.data?.theme) {
      htmlEl.setAttribute('data-bs-theme', event.data.theme);
      sendThemeToIframes(event.data.theme);
    }
    if (event.data?.ask === 'theme') {
      event.source?.postMessage({ theme: htmlEl.getAttribute('data-bs-theme') || 'light' }, '*');
    }
  });

  window.parent?.postMessage({ ask: 'theme' }, '*');

  selectCompany('JyintGroup');
</script>
</body>
</html>
